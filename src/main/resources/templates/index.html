<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartShoppingKeep</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 15px 10px; font-size: 16px; }
        .note-card { background-color: #fffde7; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border: none; }
        .item-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px dashed #e0e0e0; }
        .item-row:last-child { border-bottom: none; }
        .item-checkbox { width: 24px; height: 24px; cursor: pointer; flex-shrink: 0; }
        .item-label { font-size: 1rem; margin-left: 8px; cursor: pointer; flex-grow: 1; word-break: break-all; }
        
        /* 入力エリア（金額と税率）のグループ */
        .input-group-area { display: none; align-items: center; gap: 4px; margin-left: auto; }
        .input-group-area.active { display: flex; }
        
        /* 金額入力欄 */
        .price-input { width: 75px; font-size: 0.95rem; text-align: right; }
        
        /* 税率選択ボックス */
        .tax-select { width: 65px; font-size: 0.85rem; padding: 4px; border-radius: 6px; }

        /* ★削除ボタン（×）のスタイル */
        .delete-item-btn { background: none; border: none; color: #dc3545; font-size: 1.2rem; font-weight: bold; padding: 0 6px; margin-left: 6px; cursor: pointer; line-height: 1; }
        .delete-item-btn:hover { color: #bd2130; }
        
        .total-box { background-color: #f1f3f4; border-radius: 8px; padding: 12px; margin-top: 15px; font-size: 0.95rem; }
        .total-val { font-size: 1.3rem; }
    </style>
</head>
<body>
<div class="container-fluid">
    <h1 class="text-center my-4 fw-bold" style="font-size: 1.8rem;">🛒 SmartShoppingKeep</h1>

    <!-- 簡易入力エリア（新規カード追加） -->
    <div class="row justify-content-center mb-4">
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0" style="border-radius: 12px;">
                <div class="card-body p-3">
                    <form th:action="@{/notes/add}" method="post">
                        <div class="input-group">
                            <input type="text" name="title" class="form-control" placeholder="購入予定場所...（例：スーパー）" required>
                            <button class="btn btn-warning fw-bold" type="submit">作成</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- メモ一覧表示エリア -->
    <div class="row g-3">
        <div class="col-12 col-md-4" th:each="note : ${notes}" th:id="'note-card-' + ${note.id}">
            <div class="card note-card">
                <div class="card-body d-flex flex-column p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="card-title fw-bold m-0" th:text="${note.title}">メモのタイトル</h5>
                        <small class="text-muted" th:text="${#temporals.format(note.createdAt, 'MM/dd HH:mm')}">作成日時</small>
                    </div>
                    <hr class="my-2">

                    <!-- アイテム一覧 -->
                    <div class="flex-grow-1 my-2">
                        <!-- ★ JavaScriptで消しやすいように各行に id を付与 -->
                        <div th:each="item : ${note.shoppingItems}" class="item-row" th:id="'item-row-' + ${item.id}">
                            <input type="checkbox" th:checked="${item.isInCart}" 
                                   th:id="'item-check-' + ${item.id}"
                                   th:onchange="'toggleCart(' + ${item.id} + ')'" class="form-check-input item-checkbox">
                            
                            <label th:text="${item.name}" th:for="'item-check-' + ${item.id}" class="item-label"></label>
                            
                            <!-- 金額と税率の入力エリア -->
                            <div th:id="'input-area-' + ${item.id}" th:class="${item.isInCart} ? 'input-group-area active' : 'input-group-area'">
                                <!-- 金額入力 -->
                                <input type="number" th:value="${item.price}" 
                                       th:id="'item-price-' + ${item.id}" class="form-control form-control-sm price-input"
                                       placeholder="¥" inputmode="numeric" th:oninput="'updateItemData(' + ${item.id} + ')'">
                                
                                <!-- 税率選択セレクトボックス -->
                                <select th:id="'item-tax-' + ${item.id}" class="form-select form-select-sm tax-select" th:onchange="'updateItemData(' + ${item.id} + ')'">
                                    <option value="10" th:selected="${item.specificTaxRate == 10}">10%</option>
                                    <option value="8" th:selected="${item.specificTaxRate == 8}">8%</option>
                                    <option value="0" th:selected="${item.specificTaxRate == 0}">免税</option>
                                </select>
                            </div>

                            <!-- ★ アイテムの削除ボタン（×）を追加 -->
                            <button type="button" class="delete-item-btn" th:onclick="'deleteItem(' + ${item.id} + ')'" title="削除">×</button>
                        </div>
                        
                        <p th:if="${#lists.isEmpty(note.shoppingItems)}" class="text-muted text-center small my-4 text-no-items">（アイテムはありません）</p>
                    </div>

                    <!-- アイテム追加フォーム -->
                    <form th:action="@{/items/add}" method="post" class="mt-2">
                        <input type="hidden" name="noteId" th:value="${note.id}">
                        <div class="input-group">
                            <input type="text" name="itemName" class="form-control" placeholder="買うものを追加..." required>
                            <button class="btn btn-secondary" type="submit">＋</button>
                        </div>
                    </form>

                    <!-- リアルタイム合計金額表示エリア -->
                    <div class="total-box">
                        <div class="d-flex justify-content-between"><span>税抜合計:</span> <span class="subtotal-val">¥0</span></div>
                        <div class="d-flex justify-content-between text-muted small"><span>内訳(10%対象):</span> <span class="subtotal-10-val">¥0</span></div>
                        <div class="d-flex justify-content-between text-muted small"><span>内訳( 8%対象):</span> <span class="subtotal-8-val">¥0</span></div>
                        <div class="d-flex justify-content-between text-muted small"><span>消費税合計:</span> <span class="tax-val">¥0</span></div>
                        <hr class="my-1">
                        <div class="d-flex justify-content-between fw-bold text-danger">
                            <span>税込合計:</span> <span class="total-val">¥0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll('.note-card').forEach(card => { calculateCardTotal(card); });
    });

    function toggleCart(itemId) {
        const checkbox = document.getElementById(`item-check-${itemId}`);
        const inputArea = document.getElementById(`input-area-${itemId}`);
        const priceInput = document.getElementById(`item-price-${itemId}`);
        const taxSelect = document.getElementById(`item-tax-${itemId}`);
        const card = checkbox.closest('.note-card');

        if (checkbox.checked) {
            inputArea.classList.add('active');
            priceInput.focus();
        } else {
            inputArea.classList.remove('active');
            priceInput.value = '';
            taxSelect.value = '10';
        }
        calculateCardTotal(card);
        sendDataToServer(itemId, checkbox.checked, priceInput.value, taxSelect.value);
    }

    function updateItemData(itemId) {
        const checkbox = document.getElementById(`item-check-${itemId}`);
        const priceInput = document.getElementById(`item-price-${itemId}`);
        const taxSelect = document.getElementById(`item-tax-${itemId}`);
        const card = priceInput.closest('.note-card');
        
        calculateCardTotal(card);
        sendDataToServer(itemId, checkbox.checked, priceInput.value, taxSelect.value);
    }

    // ★ アイテムを画面とDBから削除するJavaScript関数を追加
    function deleteItem(itemId) {
        if (!confirm('このアイテムを削除してもよろしいですか？')) {
            return; // キャンセルされたら何もしない
        }

        const itemRow = document.getElementById(`item-row-${itemId}`);
        const card = itemRow.closest('.note-card');

        // Java側の削除APIを呼び出す
        const formData = new FormData();
        formData.append('itemId', itemId);

        fetch('/items/delete', { method: 'POST', body: formData })
        .then(response => response.text())
        .then(data => {
            if (data === 'success') {
                // 画面から該当の行を削除
                itemRow.remove();
                
                // アイテムがゼロになったかチェックしてメッセージを出す
                const remainingItems = card.querySelectorAll('.item-row');
                if (remainingItems.length === 0) {
                    // まだ「アイテムはありません」の文字がなければ追加する
                    if (!card.querySelector('.text-no-items')) {
                        const noItemText = document.createElement('p');
                        noItemText.className = 'text-muted text-center small my-4 text-no-items';
                        noItemText.innerText = '（アイテムはありません）';
                        card.querySelector('.flex-grow-1').appendChild(noItemText);
                    }
                }
                
                // 金額をリアルタイム再計算
                calculateCardTotal(card);
            } else {
                alert('削除に失敗しました。');
            }
        })
        .catch(error => console.error('エラー:', error));
    }

    function calculateCardTotal(card) {
        let subtotal10 = 0;
        let subtotal8 = 0;
        let subtotal0 = 0;

        card.querySelectorAll('.item-row').forEach(row => {
            const checkbox = row.querySelector('.item-checkbox');
            const priceInput = row.querySelector('.price-input');
            const taxSelect = row.querySelector('.tax-select');

            if (checkbox && checkbox.checked) {
                const price = parseInt(priceInput.value) || 0;
                const taxRate = parseInt(taxSelect.value);

                if (taxRate === 10) {
                    subtotal10 += price;
                } else if (taxRate === 8) {
                    subtotal8 += price;
                } else {
                    subtotal0 += price;
                }
            }
        });

        let subtotalTotal = subtotal10 + subtotal8 + subtotal0;
        let tax10 = Math.floor(subtotal10 * 0.1);
        let tax8 = Math.floor(subtotal8 * 0.08);
        let taxTotal = tax10 + tax8;
        let total = subtotalTotal + taxTotal;

        card.querySelector('.subtotal-val').innerText = `¥${subtotalTotal.toLocaleString()}`;
        card.querySelector('.subtotal-10-val').innerText = `¥${subtotal10.toLocaleString()}`;
        card.querySelector('.subtotal-8-val').innerText = `¥${subtotal8.toLocaleString()}`;
        card.querySelector('.tax-val').innerText = `¥${taxTotal.toLocaleString()}`;
        card.querySelector('.total-val').innerText = `¥${total.toLocaleString()}`;
    }

    function sendDataToServer(itemId, isInCart, price, specificTaxRate) {
        const formData = new FormData();
        formData.append('itemId', itemId);
        formData.append('isInCart', isInCart);
        formData.append('price', price);
        formData.append('specificTaxRate', specificTaxRate);

        fetch('/items/update', { method: 'POST', body: formData })
        .then(response => response.text())
        .then(data => { console.log('保存:', data); })
        .catch(error => console.error('エラー:', error));
    }
</script>
</body>
</html>
